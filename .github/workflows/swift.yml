# Build and test the native iOS application.
name: iOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
      - name: Build and test iOS app
        run: >-
          xcodebuild
          -project CareerVividMobileMVP/CareerVividMobileMVP.xcodeproj
          -scheme CareerVividMobileMVP
          -configuration Debug
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest'
          clean test
