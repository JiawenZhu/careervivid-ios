# Build and test the native iOS application.
name: iOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
      - name: Build iOS app
        run: >-
          xcodebuild
          -project CareerVividMobileMVP.xcodeproj
          -scheme CareerVividMobileMVP
          -configuration Debug
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          clean build
