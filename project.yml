name: CareerVividMobileMVP
options:
  bundleIdPrefix: app.careervivid
  deploymentTarget:
    iOS: "17.0"
  createSharedSchemes: true
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: C265XC3RH7
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
targets:
  CareerVividMobileMVP:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Sources/CareerVividMobileMVP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.careervivid.mobilemvp
        CODE_SIGN_IDENTITY: "Apple Development"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Vivid
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Vivid uses the microphone to turn spoken resume notes into editable resume drafts.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: Vivid uses speech recognition to show your resume coach answers in real time.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: 1

  CareerVividMobileMVPTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/CareerVividMobileMVPTests
    dependencies:
      - target: CareerVividMobileMVP
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CareerVividMobileMVP:
    build:
      targets:
        CareerVividMobileMVP: [running, testing, profiling, analyzing, archiving]
        CareerVividMobileMVPTests: [testing]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CareerVividMobileMVPTests
    archive:
      config: Release

