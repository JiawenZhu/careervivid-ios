name: CareerVividMobileMVP
options:
  bundleIdPrefix: app.careervivid
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.0
targets:
  CareerVividMobileMVP:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Sources/CareerVividMobileMVP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.careervivid.mobilemvp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CareerVivid
        INFOPLIST_KEY_NSMicrophoneUsageDescription: CareerVivid uses the microphone to turn spoken resume notes into editable resume drafts.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: CareerVivid uses speech recognition to show your resume coach answers in real time.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: 1
